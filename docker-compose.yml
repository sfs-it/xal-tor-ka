# Xal-Tor-Ka — stack di produzione/locale.
# NGINX è l'unico servizio esposto; il servizio Go non pubblica porte ed è
# raggiungibile solo sulla rete interna. La directory corrente (config + json)
# viene montata su /etc/xaltorka (read-write: setup/add-* scrivono qui).
services:
  xaltorka:
    build: .
    image: xaltorka:latest
    restart: unless-stopped
    # gira come l'utente host così i file montati restano scrivibili (bind mount)
    user: "${PUID:-1000}:${PGID:-1000}"
    expose:
      - "8080"
    environment:
      - GO_PORT=:8080
      - GATE_URL=${GATE_URL:-http://localhost}
      - TLS_MODE=${TLS_MODE:-external}
      - ADMIN_CIDR=${ADMIN_CIDR:-127.0.0.1/32}
      - EDGE_CIDR=${EDGE_CIDR:-172.16.0.0/12}
      - DOCKER_PROXY=http://docker-socket-proxy:2375
      # Deployment knobs (default = Docker; vedi .env.example). In Docker il reload
      # NGINX lo fa il container nginx via polling, quindi NGINX_RELOAD_CMD resta vuoto.
      - DEPLOY_MODE=${DEPLOY_MODE:-docker}
      - NGINX_RELOAD_CMD=${NGINX_RELOAD_CMD:-}
      - UPSTREAM_LOCALHOST=${UPSTREAM_LOCALHOST:-host.docker.internal}
    volumes:
      - ./:/etc/xaltorka
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docker-socket-proxy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Proxy read-only verso la docker.sock: espone SOLO l'API di lista container
  # (CONTAINERS=1), così Xal-Tor-Ka può scoprire i servizi senza accesso diretto
  # al socket (che resta confinato qui). Niente porte pubblicate.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - POST=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend di esempio: pagina statica servita da nginx, raggiungibile solo dalla
  # rete interna e proxata dal gateway come vhost demo.localhost.
  demo:
    image: nginx:stable-alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./demo/html:/usr/share/nginx/html:ro
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build: ./nginx
    image: xaltorka-nginx:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Per-host certs written by the Go service (self-signed/ACME); referenced by
      # the generated vhosts as /etc/nginx/certs/<host>.crt|key.
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - xaltorka
      - demo
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
