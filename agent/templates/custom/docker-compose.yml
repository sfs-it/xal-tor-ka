# Site "__NAME__" — CUSTOM stack. This is a starting point: edit it via
# "Edit compose", then Save & apply. Keep this contract so the gateway reaches you:
#   • join the external network "xtk-hosting"
#   • give your web-facing service the alias "__NAME__.site"
#   • run as the site user:  user: "__UID__:__GID__"  (unprivileged)
#   • listen on a port the gateway proxies to (default expectation: 8080)
#   • publish NO host ports
services:
  web:
    image: nginxinc/nginx-unprivileged:stable-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./httpdocs:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      xtk-hosting:
        aliases: ["__NAME__.site"]
    deploy: { resources: { limits: { cpus: "0.50", memory: 128M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
networks:
  xtk-hosting:
    external: true
