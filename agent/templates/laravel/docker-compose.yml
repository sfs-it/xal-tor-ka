# Vhost "__VHOST__" of site "__NAME__" — stack "laravel" (nginx + php-fpm with Laravel
# extensions). GENERATED by xtk-agent — do not edit by hand.
# Same shape as the php-fpm template; only the php image differs: it uses the pre-built
# xtk-php-laravel:<ver> (pdo_pgsql/pdo_mysql/bcmath/gd/zip/intl/opcache/pcntl + composer),
# built on the box (see agent/templates/laravel/Dockerfile). nginx serves __VHOST__/public.
services:
  web:
    image: nginxinc/nginx-unprivileged:stable-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./__VHOST__:/var/www/html:ro
      - ./.vhosts/__VHOST__/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/__VHOST__:/var/log/nginx
    networks:
      site:
      xtk-hosting:
        aliases: ["__ALIAS__"]
    depends_on: [php]
    deploy: { resources: { limits: { cpus: "0.50", memory: 256M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
  php:
    image: xtk-php-laravel:__PHP_VERSION__   # built on the box from templates/laravel/Dockerfile
    restart: unless-stopped
    user: "__UID__:__GID__"
    env_file: [./.vhosts/__VHOST__/db.env] # DB connection when a shared DB is attached (else empty)
    volumes:
      - ./__VHOST__:/var/www/html
    networks: [site] # private to this vhost — NOT on xtk-hosting
    deploy: { resources: { limits: { cpus: "0.75", memory: 512M } } }  # Laravel headroom
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
networks:
  site:
  xtk-hosting:
    external: true
