# Vhost "__VHOST__" of site "__NAME__" (static: nginx only). GENERATED by xtk-agent — do not edit by hand.
# Run with --project-directory /opt/sites/__NAME__ so the relative paths resolve from the site root.
# The web container joins the external "xtk-hosting" network so the gateway can
# reverse-proxy to it at http://__ALIAS__:8080 (no host port is published).
services:
  web:
    # nginx-unprivileged: runs as an arbitrary non-root uid (temp paths + pid under /tmp).
    image: nginxinc/nginx-unprivileged:stable-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./__VHOST__:/var/www/html:ro
      - ./.vhosts/__VHOST__/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/__VHOST__:/var/log/nginx
    networks:
      xtk-hosting:
        aliases: ["__ALIAS__"]
    deploy: { resources: { limits: { cpus: "0.25", memory: 64M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
networks:
  xtk-hosting:
    external: true
