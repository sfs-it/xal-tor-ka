# Site "__NAME__" (static: nginx only). GENERATED by xtk-agent site_create — do not edit by hand.
# The web container joins the external "xtk-hosting" network so the gateway can
# reverse-proxy to it at http://__NAME__.site:8080 (no host port is published).
services:
  web:
    # nginx-unprivileged: runs as an arbitrary non-root uid (temp paths + pid under /tmp).
    image: nginxinc/nginx-unprivileged:stable-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./httpdocs:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      xtk-hosting:
        aliases: ["__NAME__.site"]
    deploy: { resources: { limits: { cpus: "0.25", memory: 64M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
networks:
  xtk-hosting:
    external: true
