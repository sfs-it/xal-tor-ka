server {
    listen 8080;  # nginx-unprivileged default; the gateway proxies to __ALIAS__:8080
    root /var/www/html;
    index index.html;
    # per-vhost logs land in ./logs/__VHOST__ on the host (mounted at /var/log/nginx)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    location / { try_files $uri $uri/ =404; }
}
