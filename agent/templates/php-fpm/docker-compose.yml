# Site "__NAME__" (php-fpm+nginx). GENERATED by xtk-agent site_create — do not edit by hand.
# The web container joins the external "xtk-hosting" network so the gateway can
# reverse-proxy to it at http://__NAME__.site (no host port is published).
services:
  web:
    # nginx-unprivileged: built to run as an arbitrary non-root uid (temp paths +
    # pid under /tmp, listens on 8080). The stock nginx image cannot: it fails to
    # create /var/cache/nginx as non-root.
    image: nginxinc/nginx-unprivileged:stable-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./www:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      xtk-hosting:
        aliases: ["__NAME__.site"]
    depends_on: [php]
    deploy: { resources: { limits: { cpus: "0.50", memory: 256M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
  php:
    image: php:8.3-fpm-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./www:/var/www/html
    networks: [xtk-hosting]
    deploy: { resources: { limits: { cpus: "0.50", memory: 256M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
networks:
  xtk-hosting:
    external: true
