# Vhost "__VHOST__" of site "__NAME__" (php-fpm+nginx). GENERATED by xtk-agent — do not edit by hand.
# Run with:  docker compose --project-directory /opt/sites/__NAME__ \
#              -f .vhosts/__VHOST__/docker-compose.yml -p <project> up -d
# The relative paths below resolve from the SITE ROOT (shared by all vhosts of the site).
# web↔php talk over a PROJECT-PRIVATE network ("site"), scoped to THIS vhost's compose
# project — so the service name "php" never collides with another vhost/site's php.
# Only web joins the external "xtk-hosting" network, so the gateway can reverse-proxy
# to it at http://__ALIAS__:8080 (no host port is published).
services:
  web:
    # nginx-unprivileged: built to run as an arbitrary non-root uid (temp paths +
    # pid under /tmp, listens on 8080). The stock nginx image cannot: it fails to
    # create /var/cache/nginx as non-root.
    image: nginxinc/nginx-unprivileged:stable-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./__VHOST__:/var/www/html:ro
      - ./.vhosts/__VHOST__/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/__VHOST__:/var/log/nginx
    networks:
      site:
      xtk-hosting:
        aliases: ["__ALIAS__"]
    depends_on: [php]
    deploy: { resources: { limits: { cpus: "0.50", memory: 256M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
  php:
    image: php:__PHP_VERSION__-fpm-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    env_file: [./.vhosts/__VHOST__/db.env] # DB connection when a shared DB is attached (else empty)
    volumes:
      - ./__VHOST__:/var/www/html
    networks: [site] # private to this vhost — NOT on xtk-hosting
    deploy: { resources: { limits: { cpus: "0.50", memory: 256M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
networks:
  site: # project-private (compose creates <project>_site); scopes the "php" name here
  xtk-hosting:
    external: true
