# Site "__NAME__" (php-fpm+nginx). GENERATED by xtk-agent site_create — do not edit by hand.
# web↔php talk over a PROJECT-PRIVATE network ("site"), so the service name "php" is
# scoped to THIS site — never colliding with another site's php on the shared network.
# Only web also joins the external "xtk-hosting" network, so the gateway can
# reverse-proxy to it at http://__NAME__.site:8080 (no host port is published).
services:
  web:
    # nginx-unprivileged: built to run as an arbitrary non-root uid (temp paths +
    # pid under /tmp, listens on 8080). The stock nginx image cannot: it fails to
    # create /var/cache/nginx as non-root.
    image: nginxinc/nginx-unprivileged:stable-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./www:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      site:
      xtk-hosting:
        aliases: ["__NAME__.site"]
    depends_on: [php]
    deploy: { resources: { limits: { cpus: "0.50", memory: 256M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
  php:
    image: php:__PHP_VERSION__-fpm-alpine
    restart: unless-stopped
    user: "__UID__:__GID__"
    volumes:
      - ./www:/var/www/html
    networks: [site] # private to this site — NOT on xtk-hosting
    deploy: { resources: { limits: { cpus: "0.50", memory: 256M } } }
    logging: { driver: "json-file", options: { max-size: "10m", max-file: "3" } }
networks:
  site: # project-private (compose creates <name>_site); scopes the "php" name here
  xtk-hosting:
    external: true
