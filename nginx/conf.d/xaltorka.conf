# Gateway NGINX — unico punto esposto. Inoltra all'auth service Go (interno).
#
# NOTA: il routing dinamico host→upstream dei singoli backend sarà GENERATO dal
# proxy manager (BLUEPRINT §16.3, ancora da implementare): produrrà un server{}
# per backend con `auth_request` + `proxy_pass` verso l'upstream reale. Per ora
# questo vhost espone l'interfaccia di Xal-Tor-Ka (login/setup/2FA/listing/admin)
# e tiene pronta la subrequest di autenticazione.

# Nome distinto dal DNS del servizio ("xaltorka"), così i server{} generati
# possono usare proxy_pass http://xaltorka:8080 senza collidere con questo gruppo.
upstream xtk_app {
    server xaltorka:8080;
}

server {
    listen 80 default_server;
    server_name _;

    # Hardening header (vedi MYRULES NGINX §1)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;

    # Subrequest interna di autenticazione (pronta per i server{} generati).
    location = /__auth {
        internal;
        proxy_pass              http://xtk_app/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-Host $host;
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Interfaccia e endpoint di Xal-Tor-Ka.
    location / {
        proxy_pass        http://xtk_app;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }
}
