# Xal-Tor-Ka gate nginx.conf — static (bypasses the base image's env-template).
# Loads the ModSecurity module so per-vhost `modsecurity on;` works; WAF stays OFF
# globally (turned on per-server-block by the proxy manager). Includes the generated
# conf.d/backends.conf.
load_module modules/ngx_http_modsecurity_module.so;

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    # generated reverse-proxy vhosts (backends.conf) + any static conf
    include /etc/nginx/conf.d/*.conf;
}
