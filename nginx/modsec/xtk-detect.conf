# Xal-Tor-Ka WAF — DETECTION-ONLY mode (logs CRS hits, never blocks). Use for the
# break-in period to tune false positives, then switch the vhost to blocking.
# Referenced per-vhost: `modsecurity_rules_file .../xtk-detect.conf`.
SecRuleEngine DetectionOnly
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecResponseBodyAccess Off
SecTmpDir /tmp/
SecDataDir /tmp/
SecUnicodeMapFile /etc/modsecurity.d/unicode.mapping 20127
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/nginx/modsec_audit.log
SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

Include /etc/modsecurity.d/owasp-crs/crs-setup.conf
Include /etc/modsecurity.d/owasp-crs/rules/*.conf
