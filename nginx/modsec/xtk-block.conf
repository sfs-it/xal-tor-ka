# Xal-Tor-Ka WAF — BLOCKING mode (ModSecurity engine On → 403 on a CRS hit).
# Referenced per-vhost by the proxy manager: `modsecurity_rules_file .../xtk-block.conf`.
# Self-contained base (the image ships no modsecurity.conf) + OWASP CRS.
SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecResponseBodyAccess Off
SecTmpDir /tmp/
SecDataDir /tmp/
SecUnicodeMapFile /etc/modsecurity.d/unicode.mapping 20127
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/nginx/modsec_audit.log
SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

Include /etc/modsecurity.d/owasp-crs/crs-setup.conf
Include /etc/modsecurity.d/owasp-crs/rules/*.conf
